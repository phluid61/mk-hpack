<h1><a href="#database" aria-hidden="true" class="anchor" id="database"></a>Database</h1>
<p>This project does not use a database. mkhpack is a stateless C library that
operates entirely on in-memory byte buffers provided by the caller. There is no
persistent data storage, file-based state, or external data service.</p>
